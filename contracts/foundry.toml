[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "paris"
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

# Verbose revert traces during tests/scripts.
verbosity = 3

[fmt]
line_length = 110
tab_width = 4
bracket_spacing = false
int_types = "long"

[rpc_endpoints]
arbitrum_one = "${ARB_ONE_RPC}"
arbitrum_sepolia = "${ARB_SEPOLIA_RPC}"
robinhood = "${ROBINHOOD_RPC}"

[etherscan]
arbitrum_one = { key = "${ARBISCAN_API_KEY}", chain = 42161 }
arbitrum_sepolia = { key = "${ARBISCAN_API_KEY}", chain = 421614 }

# ----------------------------------------------------------------------
# Notes
# ----------------------------------------------------------------------
# This repo was scaffolded and compile-verified with solc 0.8.24 +
# OpenZeppelin v5.0.2. To build with Foundry:
#
#   forge install foundry-rs/forge-std
#   forge install OpenZeppelin/openzeppelin-contracts@v5.0.2
#   forge build
#
# The remappings above expect OZ at lib/openzeppelin-contracts (the forge
# install path). If you use the npm layout (node_modules/@openzeppelin),
# change the first remapping to:
#   "@openzeppelin/contracts/=node_modules/@openzeppelin/contracts/"
